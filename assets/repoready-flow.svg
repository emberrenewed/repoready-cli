<svg width="900" height="300" viewBox="0 0 900 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#282A36"/>
      <stop offset="1" stop-color="#171923"/>
    </linearGradient>
    <linearGradient id="track" x1="76" y1="0" x2="824" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF79C6"/>
      <stop offset=".5" stop-color="#BD93F9"/>
      <stop offset="1" stop-color="#8BE9FD"/>
    </linearGradient>
  </defs>
  <style>
    .node-a { animation: nodeA 6s infinite; }
    .node-b { animation: nodeB 6s infinite; }
    .node-c { animation: nodeC 6s infinite; }
    .node-d { animation: nodeD 6s infinite; }
    .path { animation: pathGlow 6s infinite; transform-origin: left center; }
    .pulse-a { animation: pulseA 6s infinite; }
    .pulse-b { animation: pulseB 6s infinite; }
    .pulse-c { animation: pulseC 6s infinite; }
    .pulse-d { animation: pulseD 6s infinite; }
    @keyframes nodeA {
      0%, 18% { fill: #FF79C6; }
      19%, 100% { fill: #50FA7B; }
    }
    @keyframes nodeB {
      0%, 18% { fill: #6272A4; }
      19%, 38% { fill: #FF79C6; }
      39%, 100% { fill: #50FA7B; }
    }
    @keyframes nodeC {
      0%, 38% { fill: #6272A4; }
      39%, 62% { fill: #FF79C6; }
      63%, 100% { fill: #50FA7B; }
    }
    @keyframes nodeD {
      0%, 62% { fill: #6272A4; }
      63%, 84% { fill: #FF79C6; }
      85%, 100% { fill: #50FA7B; }
    }
    @keyframes pathGlow {
      0% { transform: scaleX(.06); opacity: .35; }
      18% { transform: scaleX(.27); opacity: .7; }
      38% { transform: scaleX(.52); opacity: .82; }
      62% { transform: scaleX(.76); opacity: .92; }
      84%, 100% { transform: scaleX(1); opacity: 1; }
    }
    @keyframes pulseA {
      0%, 18% { opacity: 1; }
      19%, 100% { opacity: .2; }
    }
    @keyframes pulseB {
      0%, 18% { opacity: .2; }
      19%, 38% { opacity: 1; }
      39%, 100% { opacity: .2; }
    }
    @keyframes pulseC {
      0%, 38% { opacity: .2; }
      39%, 62% { opacity: 1; }
      63%, 100% { opacity: .2; }
    }
    @keyframes pulseD {
      0%, 62% { opacity: .2; }
      63%, 100% { opacity: 1; }
    }
  </style>

  <rect x="8" y="8" width="884" height="284" rx="22" fill="url(#bg)" stroke="#8BE9FD" stroke-width="2"/>
  <text x="450" y="42" text-anchor="middle" fill="#F8F8F2" font-size="18" font-weight="700" font-family="Verdana, Arial, sans-serif">
    From GitHub link to clear next step
  </text>

  <rect x="76" y="136" width="748" height="10" rx="5" fill="#44475A"/>
  <rect class="path" x="76" y="136" width="748" height="10" rx="5" fill="url(#track)"/>

  <circle cx="118" cy="141" r="34" fill="#20222D" stroke="#FF79C6" stroke-width="2"/>
  <circle class="node-a" cx="118" cy="141" r="15"/>
  <circle class="pulse-a" cx="118" cy="141" r="27" stroke="#FF79C6" stroke-opacity=".45" stroke-width="3"/>
  <text x="118" y="94" text-anchor="middle" fill="#FF79C6" font-size="16" font-family="Verdana, Arial, sans-serif">1. Paste link</text>
  <text x="118" y="203" text-anchor="middle" fill="#F8F8F2" font-size="14" font-family="Verdana, Arial, sans-serif">GitHub URL</text>

  <circle cx="338" cy="141" r="34" fill="#20222D" stroke="#BD93F9" stroke-width="2"/>
  <circle class="node-b" cx="338" cy="141" r="15"/>
  <circle class="pulse-b" cx="338" cy="141" r="27" stroke="#BD93F9" stroke-opacity=".45" stroke-width="3"/>
  <text x="338" y="94" text-anchor="middle" fill="#BD93F9" font-size="16" font-family="Verdana, Arial, sans-serif">2. Scan files</text>
  <text x="338" y="203" text-anchor="middle" fill="#F8F8F2" font-size="14" font-family="Verdana, Arial, sans-serif">Detect stack</text>

  <circle cx="558" cy="141" r="34" fill="#20222D" stroke="#F1FA8C" stroke-width="2"/>
  <circle class="node-c" cx="558" cy="141" r="15"/>
  <circle class="pulse-c" cx="558" cy="141" r="27" stroke="#F1FA8C" stroke-opacity=".45" stroke-width="3"/>
  <text x="558" y="94" text-anchor="middle" fill="#F1FA8C" font-size="16" font-family="Verdana, Arial, sans-serif">3. Check system</text>
  <text x="558" y="203" text-anchor="middle" fill="#F8F8F2" font-size="14" font-family="Verdana, Arial, sans-serif">Find gaps</text>

  <circle cx="778" cy="141" r="34" fill="#20222D" stroke="#50FA7B" stroke-width="2"/>
  <circle class="node-d" cx="778" cy="141" r="15"/>
  <circle class="pulse-d" cx="778" cy="141" r="27" stroke="#50FA7B" stroke-opacity=".45" stroke-width="3"/>
  <text x="778" y="94" text-anchor="middle" fill="#50FA7B" font-size="16" font-family="Verdana, Arial, sans-serif">4. Act safely</text>
  <text x="778" y="203" text-anchor="middle" fill="#F8F8F2" font-size="14" font-family="Verdana, Arial, sans-serif">Fix or download</text>

  <text x="450" y="252" text-anchor="middle" fill="#6272A4" font-size="14" font-family="Verdana, Arial, sans-serif">
    Every important step stays visible, friendly, and under your control.
  </text>
</svg>
